name: CI for Fork PRs

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  basic-checks:
    uses: ./.github/workflows/_reusable-ci.yml
    with:
      check_type: 'basic'
    # No secrets: inherit — fork PRs don't need secrets for basic checks
