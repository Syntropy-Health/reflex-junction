name: Publish

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only publish when CI passed on a tag push (not PRs)
    if: >-
      github.event.workflow_run.conclusion == 'success'
      && github.repository == 'Syntropy-Health/reflex-junction'
      && startsWith(github.event.workflow_run.head_branch, 'v')
    environment: deploy
    permissions:
      contents: write
      id-token: write  # Required for PyPI trusted publishers

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.5"

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate version consistency
        run: |
          # Extract tag from ref (e.g., "v0.2.0" → "0.2.0")
          TAG="${{ github.event.workflow_run.head_branch }}"
          TAG_VERSION="${TAG#v}"

          # Extract version from __init__.py
          PKG_VERSION=$(python -c "
          import re
          with open('custom_components/reflex_junction/__init__.py') as f:
              match = re.search(r'__version__\s*=\s*\"(.+?)\"', f.read())
              print(match.group(1) if match else '')
          ")

          echo "Tag version:     ${TAG_VERSION}"
          echo "Package version: ${PKG_VERSION}"

          if [ "${TAG_VERSION}" != "${PKG_VERSION}" ]; then
            echo "::error::Version mismatch! Tag ${TAG} does not match package version ${PKG_VERSION}"
            exit 1
          fi

          echo "VERSION=${PKG_VERSION}" >> $GITHUB_ENV

      - name: Build package
        run: |
          cd custom_components && uv run python -m reflex.utils.pyi_generator reflex_junction
          cd .. && uv build
          echo "## Build Artifacts" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -la dist/ >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Uses trusted publishers (OIDC) — no token needed
          # Falls back to PYPI_TOKEN if trusted publishers not configured
          password: ${{ secrets.PYPI_TOKEN }}

      - name: Create GitHub Release
        run: |
          gh release create "v${VERSION}" dist/* \
            --title "v${VERSION}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish docs
        run: |
          uv sync --dev
          uv run mkdocs gh-deploy --force
