name: 'Full CI Checks'
description: 'Runs full CI including unit tests, integration tests, and build validation'
inputs:
  junction-api-key:
    description: 'Junction (Vital) API key for integration tests'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Check env vars set
      run: |
        if [ -z "${{ inputs.junction-api-key }}" ]; then
          echo "JUNCTION_API_KEY is not set"
          exit 1
        fi
      shell: bash

    - name: Install dependencies
      run: uv sync --dev
      shell: bash

    - name: Run lint
      run: task lint
      shell: bash

    - name: Run typecheck
      run: task typecheck
      shell: bash

    - name: Run unit tests
      run: uv run pytest -m "not integration" --tb=short -q
      shell: bash

    - name: Run integration tests
      run: uv run pytest -m integration -v --tb=short
      shell: bash
      env:
        JUNCTION_API_KEY: ${{ inputs.junction-api-key }}

    - name: Validate package build
      run: |
        cd custom_components && uv run python -m reflex.utils.pyi_generator reflex_junction
        cd .. && uv build
        echo "Build artifacts:"
        ls -la dist/
      shell: bash
